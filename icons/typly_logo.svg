<svg width="100%" viewBox="0 0 680 340" role="img" xmlns="http://www.w3.org/2000/svg" style="">
  <title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Typly logo</title>
  <desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Typly Chrome extension logo featuring stylized typography with a cursor element</desc>

  <defs>
    
  <mask id="imagine-text-gaps-svzl1l" maskUnits="userSpaceOnUse"><rect x="0" y="0" width="680" height="340" fill="white"/><rect x="114" y="73" width="51.21875" height="86" fill="black" rx="2"/><rect x="164" y="106" width="68" height="106" fill="black" rx="2"/><rect x="221" y="106" width="170.7265625" height="106" fill="black" rx="2"/><rect x="526" y="73" width="51.21875" height="86" fill="black" rx="2"/><rect x="179.375" y="235" width="321.25" height="19" fill="black" rx="2"/></mask></defs>

  <!-- Card background -->
  <rect x="90" y="20" width="500" height="300" rx="28" fill="#12121f" style="fill:rgb(18, 18, 31);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <rect x="90" y="20" width="500" height="300" rx="28" fill="none" stroke="#3C3489" stroke-width="1" style="fill:none;stroke:rgb(60, 52, 137);color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Decorative bracket left -->
  <text x="118" y="135" font-family="'Courier New', monospace" font-size="72" fill="#3C3489" font-weight="400" style="fill:rgb(60, 52, 137);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Courier New&quot;, monospace;font-size:72px;font-weight:400;text-anchor:start;dominant-baseline:auto">{</text>

  <!-- Main wordmark -->
  <!-- T in purple -->
  <text x="168" y="190" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="92" fill="#7F77DD" letter-spacing="-2" style="fill:rgb(127, 119, 221);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Georgia, &quot;Times New Roman&quot;, serif;font-size:92px;font-weight:700;text-anchor:start;dominant-baseline:auto">T</text>
  <!-- yply in white -->
  <text x="225" y="190" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="92" fill="#ffffff" letter-spacing="-2" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Georgia, &quot;Times New Roman&quot;, serif;font-size:92px;font-weight:700;text-anchor:start;dominant-baseline:auto">yply</text>

  <!-- Blinking cursor after text -->
  <rect x="510" y="110" width="10" height="72" rx="2" fill="#7F77DD" opacity="0.9" style="fill:rgb(127, 119, 221);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.633236;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
    <animate attributeName="opacity" values="0.9;0.1;0.9" dur="1.1s" repeatCount="indefinite" style="fill:rgb(127, 119, 221);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  </rect>

  <!-- Decorative bracket right -->
  <text x="530" y="135" font-family="'Courier New', monospace" font-size="72" fill="#3C3489" font-weight="400" style="fill:rgb(60, 52, 137);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Courier New&quot;, monospace;font-size:72px;font-weight:400;text-anchor:start;dominant-baseline:auto">}</text>

  <!-- Teal underline accent under the wordmark -->
  <line x1="168" y1="207" x2="514" y2="207" stroke="#5DCAA5" stroke-width="3.5" stroke-linecap="round" mask="url(#imagine-text-gaps-svzl1l)" style="fill:rgb(0, 0, 0);stroke:rgb(93, 202, 165);color:rgb(255, 255, 255);stroke-width:3.5px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Tagline -->
  <text x="340" y="248" font-family="'Courier New', monospace" font-size="13" fill="#5F5E5A" letter-spacing="3" text-anchor="middle" style="fill:rgb(95, 94, 90);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Courier New&quot;, monospace;font-size:13px;font-weight:400;text-anchor:middle;dominant-baseline:auto">FONT · SIZE · COLOR · SPACING</text>

  <!-- Small dots decorative -->
  <circle cx="145" cy="248" r="2.5" fill="#3C3489" style="fill:rgb(60, 52, 137);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <circle cx="535" cy="248" r="2.5" fill="#3C3489" style="fill:rgb(60, 52, 137);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
</svg>